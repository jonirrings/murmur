#:schema node_modules/wrangler/config-schema.json
name = "murmur"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]
routes = [{ pattern = "mm.o0x0o.com", custom_domain = true }]

# 客户端静态资源
[assets]
directory = "dist/client"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = true

# ─── 环境变量 ───────────────────────────────────────────────────────
# 非敏感默认值可放在 [vars] 中。
# 环境相关的变量（RP_ID, ORIGIN, TURNSTILE_SITE_KEY 等）请通过以下方式设置：
#   本地开发 → .dev.vars 文件（已 gitignore）
#   生产环境 → Cloudflare Dashboard → Workers → Settings → Variables
#             或 wrangler secret put <KEY>（用于敏感值）
# ────────────────────────────────────────────────────────────────────

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "murmur-db"
database_id = "14a1028b-7087-436c-8a43-65e81436d408"

# KV 命名空间（SSR 缓存）
[[kv_namespaces]]
binding = "KV"
id = "a7554755490144d59ea1f842ab81fd71"

# R2 存储桶（附件）
[[r2_buckets]]
binding = "R2"
bucket_name = "murmur-assets"

# Durable Objects
[durable_objects]
bindings = [
  { name = "COLLAB_DO", class_name = "CollaborationRoomDO" },
  { name = "RATE_LIMITER_DO", class_name = "RateLimiterDO" },
  { name = "VISITOR_COUNTER_DO", class_name = "VisitorCounterDO" },
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["CollaborationRoomDO", "RateLimiterDO", "VisitorCounterDO"]

# Cron Triggers — periodic cleanup
[triggers]
crons = ["*/30 * * * *"]

[observability]
[observability.logs]
enabled = true
invocation_logs = true
