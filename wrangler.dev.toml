#:schema node_modules/wrangler/config-schema.json
name = "murmur-dev"
main = "src/index.ts"
compatibility_date = "2025-12-01"
compatibility_flags = ["nodejs_compat"]

# 客户端静态资源
[assets]
directory = "dist/client"
binding = "ASSETS"
html_handling = "auto-trailing-slash"
not_found_handling = "single-page-application"
run_worker_first = true

# 环境变量由 .dev.vars 提供，不在此处设置

[[d1_databases]]
binding = "DB"
database_name = "murmur-db-dev"
database_id = "placeholder-dev"

[[kv_namespaces]]
binding = "KV"
id = "placeholder-dev"

[[r2_buckets]]
binding = "R2"
bucket_name = "murmur-assets-dev"

[durable_objects]
bindings = [
  { name = "COLLAB_DO", class_name = "CollaborationRoomDO" },
  { name = "RATE_LIMITER_DO", class_name = "RateLimiterDO" },
  { name = "VISITOR_COUNTER_DO", class_name = "VisitorCounterDO" },
]

[[migrations]]
tag = "v1"
new_classes = ["CollaborationRoomDO", "RateLimiterDO"]

[[migrations]]
tag = "v2"
new_classes = ["VisitorCounterDO"]

# Cron Triggers — periodic cleanup (dev)
[triggers]
crons = ["*/30 * * * *"]
